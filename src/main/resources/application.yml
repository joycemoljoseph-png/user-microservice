spring:
  application:
    name: user-microservice
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  
  h2:
    console:
      enabled: true

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    org.springframework.web: INFO
    com.example: DEBUG
